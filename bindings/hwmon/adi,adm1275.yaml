%YAML 1.2
---
$id: http://devicetree.org/schemas/hwmon/adi,adm1275.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Analog Devices ADM1075/ADM127x/ADM1281/ADM129x digital power monitors

maintainers:
  - Krzysztof Kozlowski <krzk@kernel.org>

description: |
  The ADM1293 and ADM1294 are high accuracy integrated digital power monitors
  that offer digital current, voltage, and power monitoring using an on-chip,
  12-bit analog-to-digital converter (ADC), communicated through a PMBus
  compliant I2C interface.

  Datasheets:
    https://www.analog.com/en/products/adm1294.html

  The SQ24905C is also a Hot-swap controller compatibility to the ADM1278,
  the PMBUS_MFR_MODEL is MC09C

  Datasheets:
    https://www.silergy.com/
    download/downloadFile?id=5669&type=product&ftype=note

  The BD12780 and BD12780A are hot-swap controllers from ROHM. They are
  functionally compatible with the ADM1278. The main difference between
  the BD12780A and the BD12780 is amount of configurable I2C addresses.

  Datasheets:
    https://fscdn.rohm.com/en/products/databook/datasheet/ic/power/power_switch/bd12780muv-lb-e.pdf
    https://fscdn.rohm.com/en/products/databook/datasheet/ic/power/power_switch/bd12780amuv-lb-e.pdf

  The BD12790 is a ROHM hot-swap controller, functionally similar to the
  ADM1272.

properties:
  compatible:
    oneOf:
      - enum:
          - adi,adm1075
          - adi,adm1272
          - adi,adm1273
          - adi,adm1275
          - adi,adm1276
          - adi,adm1278
          - adi,adm1281
          - adi,adm1293
          - adi,adm1294
          - rohm,bd12780
          - rohm,bd12790
          - silergy,mc09c

      # Require BD12780 as a fall-back for BD12780A.
      - items:
          - const: rohm,bd12780a
          - const: rohm,bd12780

  reg:
    maxItems: 1

  adi,volt-curr-sample-average:
    description: |
      Number of samples to be used to report voltage and current values.
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [1, 2, 4, 8, 16, 32, 64, 128]

  adi,power-sample-average:
    description: |
      Number of samples to be used to report power values.
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [1, 2, 4, 8, 16, 32, 64, 128]

allOf:
  - $ref: hwmon-common.yaml#
  - if:
      properties:
        compatible:
          contains:
            enum:
              - adi,adm1075
              - adi,adm1276
    then:
      properties:
        adi,volt-curr-sample-average:
          default: 128
        adi,power-sample-average: false

  - if:
      properties:
        compatible:
          contains:
            enum:
              - adi,adm1275
    then:
      properties:
        adi,volt-curr-sample-average:
          default: 16
        adi,power-sample-average: false

  - if:
      properties:
        compatible:
          contains:
            enum:
              - adi,adm1272
              - adi,adm1273
              - rohm,bd12790
    then:
      properties:
        adi,volt-curr-sample-average:
          default: 128
        adi,power-sample-average:
          default: 128

  - if:
      properties:
        compatible:
          contains:
            enum:
              - adi,adm1278
              - adi,adm1281
              - adi,adm1293
              - adi,adm1294
              - rohm,bd12780
              - silergy,mc09c
    then:
      properties:
        adi,volt-curr-sample-average:
          default: 128
        adi,power-sample-average:
          default: 1

required:
  - compatible
  - reg

unevaluatedProperties: false

examples:
  - |
    i2c {
        #address-cells = <1>;
        #size-cells = <0>;

        power-sensor@10 {
            compatible = "adi,adm1272";
            reg = <0x10>;
            shunt-resistor-micro-ohms = <500>;
            adi,volt-curr-sample-average = <128>;
            adi,power-sample-average = <128>;
        };
    };
