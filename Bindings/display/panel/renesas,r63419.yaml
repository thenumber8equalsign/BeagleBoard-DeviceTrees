%YAML 1.2
---
$id: http://devicetree.org/schemas/display/panel/renesas,r63419.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Renesas R63419 based dual-DSI video mode Display Panel

maintainers:
  - Neil Armstrong <neil.armstrong@linaro.org>

description:
  The Renesas R63419 is a generic DDIC used to control dual-DSI LCD panels.

allOf:
  - $ref: panel-common-dual.yaml#

properties:
  compatible:
    items:
      - enum:
          - ayaneo,wt0600-2k
          - ayaneo,wt0630-2k
      - const: renesas,r63419

  reg:
    maxItems: 1

  vdd-supply: true
  vddio-supply: true
  vsp-supply: true
  vsn-supply: true
  vci-supply: true

  backlight: true
  reset-gpios: true
  rotation: true
  ports: true

required:
  - compatible
  - reg
  - vdd-supply
  - vddio-supply
  - vsp-supply
  - vsn-supply
  - vci-supply
  - backlight
  - reset-gpios
  - ports

additionalProperties: false

examples:
  - |
    #include <dt-bindings/gpio/gpio.h>

    dsi {
        #address-cells = <1>;
        #size-cells = <0>;

        panel@0 {
            compatible = "ayaneo,wt0600-2k", "renesas,r63419";
            reg = <0>;

            reset-gpios = <&gpio 176 GPIO_ACTIVE_LOW>;

            vdd-supply = <&vdd_3v0_lcd>;
            vddio-supply = <&vdd_1v8_io>;
            vsn-supply = <&vdd_5v0_neg>;
            vsp-supply = <&vdd_5v0_pos>;
            vci-supply = <&vdd_3v0_vci>;

            backlight = <&backlight>;

            rotation = <90>;

            ports {
                #address-cells = <1>;
                #size-cells = <0>;

                port@0 {
                    reg = <0>;
                    panel_in0: endpoint {
                        remote-endpoint = <&dsi0_out>;
                    };
                };

                port@1 {
                    reg = <1>;
                    panel_in1: endpoint {
                        remote-endpoint = <&dsi1_out>;
                    };
                };
            };
        };
    };
...
